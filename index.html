<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Course Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        /* Global styles */
        * {
            box-sizing: border-box;
            font-family: "Times New Roman", serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(
                135deg,
                #0f172a 0%,
                #1e3a8a 50%,
                #0f172a 100%
            );
            color: #e5e7eb;
            min-height: 100vh;
            background-size: cover;
        }

        /* Subtle language-themed background pattern */
        body::before {
            content: "こんにちは  Hello  Hola  Bonjour  مرحبا  Привет  你好";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vw;
            opacity: 0.05;
            white-space: nowrap;
            pointer-events: none;
        }

        /* Centered heading */
        h1 {
            text-align: center;
            margin-top: 10px;
            font-size: 2rem;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        /* Section headings */
        h2 {
            margin-top: 30px;
            color: #93c5fd;
            text-align: center;
        }

        /* Responsive container */
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        label {
            display: block;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
        }

        textarea {
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #7dd3fc;
        }

        /* Payment button styling */
        .pay-button {
            background: #22c55e;
            margin-top: 15px;
        }

        .pay-button:hover {
            background: #4ade80;
        }
    </style>
</head>

<body>
    <h1>Course Registration</h1>

    <div class="container">

        <!-- COURSE DETAILS SECTION -->
        <h2>Course Details</h2>
        <textarea placeholder="Write all the course details here... 
For example:
• Course name
• What students will learn
• Schedule
• Duration
• Price
• Requirements
• Teacher info
• Anything else you want"></textarea>

        <!-- REGISTRATION FORM -->
        <h2>Sign Up</h2>
        <form>
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Age</label>
            <input type="number" placeholder="Enter your age" required>

            <label>Nationality</label>
            <input type="text" placeholder="Where are you from?" required>

            <label>Language You Want to Learn</label>
            <select required>
                <option value="">Select a language</option>
                <option>Spanish</option>
                <option>French</option>
                <option>German</option>
                <option>Japanese</option>
                <option>Chinese</option>
                <option>Arabic</option>
                <option>Russian</option>
            </select>

            <button type="submit">Submit Registration</button>
        </form>

        <!-- PAYMENT BUTTON (placeholder for Stripe) -->
        <button class="pay-button">Proceed to Payment</button>

    </div>
</body>
</html>
